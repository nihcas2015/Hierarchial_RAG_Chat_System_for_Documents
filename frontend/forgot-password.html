<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat System - Forgot Password</title>
    <link rel="stylesheet" href="login.css">
    <style>
        .reset-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #1565c0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="login-container">
        <div class="login-card">
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your email to receive reset instructions</p>

            <form id="resetForm">
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="resetInfo" class="reset-info"></div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <button type="submit" id="resetBtn" class="login-btn">
                    <span>Send Reset Link</span>
                </button>
            </form>

            <div class="divider">or</div>

            <div class="links">
                <a href="login.html" class="link">Back to Login</a>
                <span class="separator">•</span>
                <a href="signup.html" class="link">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
