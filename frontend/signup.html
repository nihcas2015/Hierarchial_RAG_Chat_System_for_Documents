<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat System - Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="signup-container">
        <div class="signup-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join RAG Chat and start asking questions</p>

            <form id="signupForm">
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        placeholder="John Doe"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="At least 8 characters"
                        required
                    >
                    <div id="passwordStrength" class="password-strength"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter password"
                        required
                    >
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms of Service</label>
                </div>

                <button type="submit" id="signupBtn" class="signup-btn">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="divider">or</div>

            <div class="links">
                <p>Already have an account? <a href="login.html" class="link">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
